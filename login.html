<html>

<head>

    <title>Login Page</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f4f4f4;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:400px;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
            color:#007BFF;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            background:#007BFF;
            color:white;
            font-size:18px;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover{
            background:#0056b3;
        }

    </style>

</head>

<body>

    <form method="POST" class="login-box">

        <h2>Smart Study Material Sharing Platform</h2>

        <div class="input-box">
            <input type="email"
                   name="email"
                   placeholder="Enter Email"
                   required>
        </div>
        <div class="input-box">
            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit"
                name="submit-btn"
                class="btn">

            Login

        </button>

    </form>

</body>
</html>
